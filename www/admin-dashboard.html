<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoSmile Admin - Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center py-4">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-gray-800">NeoSmile Dashboard</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-gray-600">Admin</span>
                    <a href="/api/admin/logout" class="text-red-600 hover:text-red-800">
                        <i class="fas fa-sign-out-alt mr-1"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Section -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-teal-100 text-teal-700">
                        <i class="fas fa-users text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Totale Lead</p>
                        <h3 class="font-bold text-2xl" id="total-leads">-</h3>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-blue-100 text-blue-700">
                        <i class="fas fa-calendar-alt text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Lead questo mese</p>
                        <h3 class="font-bold text-2xl" id="monthly-leads">-</h3>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-lg shadow p-6">
                <div class="flex items-center">
                    <div class="p-3 rounded-full bg-purple-100 text-purple-700">
                        <i class="fas fa-chart-line text-xl"></i>
                    </div>
                    <div class="ml-4">
                        <p class="text-gray-500 text-sm">Tasso di conversione</p>
                        <h3 class="font-bold text-2xl" id="conversion-rate">-</h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="bg-white rounded-lg shadow p-4 mb-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between space-y-4 md:space-y-0">
                <div class="flex items-center space-x-2">
                    <input type="text" id="search-input" placeholder="Cerca..." class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
                    <button id="search-button" class="bg-teal-600 text-white px-4 py-2 rounded-lg hover:bg-teal-700">
                        <i class="fas fa-search mr-1"></i> Cerca
                    </button>
                </div>
                
                <div class="flex items-center space-x-2">
                    <select id="filter-source" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <option value="">Tutte le fonti</option>
                        <option value="hero-form">Form Hero</option>
                        <option value="popup-form">Form Popup</option>
                        <option value="contatti-form">Form Contatti</option>
                    </select>
                    
                    <a href="/api/admin/export" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                        <i class="fas fa-download mr-1"></i> Esporta
                    </a>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Telefono</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fonte</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Data</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Azioni</th>
                        </tr>
                    </thead>
                    <tbody id="data-table-body" class="bg-white divide-y divide-gray-200">
                        <!-- I dati verranno inseriti qui via JavaScript -->
                        <tr>
                            <td colspan="6" class="px-6 py-4 text-center text-gray-500">Caricamento dati...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
            
            <!-- Pagination -->
            <div class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                <div class="flex-1 flex justify-between sm:hidden">
                    <button id="prev-page-mobile" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                        Precedente
                    </button>
                    <button id="next-page-mobile" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                        Successivo
                    </button>
                </div>
                <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                    <div>
                        <p id="pagination-info" class="text-sm text-gray-700">
                            Visualizzazione <span class="font-medium" id="start-item">-</span> - <span class="font-medium" id="end-item">-</span> di <span class="font-medium" id="total-items">-</span> risultati
                        </p>
                    </div>
                    <div>
                        <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination" id="pagination-container">
                            <!-- I pulsanti di paginazione verranno inseriti qui via JavaScript -->
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Lead Detail Modal -->
    <div id="lead-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg max-w-lg w-full mx-4 shadow-xl">
            <div class="px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                <h3 class="text-lg font-bold text-gray-800">Dettagli Lead</h3>
                <button id="close-modal" class="text-gray-500 hover:text-gray-700">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="px-6 py-4" id="lead-details">
                <!-- I dettagli del lead verranno inseriti qui via JavaScript -->
            </div>
            <div class="px-6 py-3 bg-gray-50 rounded-b-lg flex justify-end">
                <button id="close-modal-btn" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                    Chiudi
                </button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Variabili globali per la paginazione
            let currentPage = 1;
            let totalPages = 1;
            let pageLimit = 10;
            let currentSearchTerm = '';
            let currentSourceFilter = '';
            
            // Elementi DOM
            const dataTableBody = document.getElementById('data-table-body');
            const paginationContainer = document.getElementById('pagination-container');
            const startItem = document.getElementById('start-item');
            const endItem = document.getElementById('end-item');
            const totalItems = document.getElementById('total-items');
            const totalLeadsElement = document.getElementById('total-leads');
            const monthlyLeadsElement = document.getElementById('monthly-leads');
            const conversionRateElement = document.getElementById('conversion-rate');
            const searchInput = document.getElementById('search-input');
            const searchButton = document.getElementById('search-button');
            const filterSource = document.getElementById('filter-source');
            const leadModal = document.getElementById('lead-modal');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const closeModalX = document.getElementById('close-modal');
            
            // Funzione per formattare la data
            function formatDate(dateString) {
                const options = { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
                return new Date(dateString).toLocaleDateString('it-IT', options);
            }
            
            // Funzione per caricare i dati
            async function loadData() {
                try {
                    dataTableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Caricamento dati...</td></tr>';
                    
                    let url = `/api/admin/form-data?page=${currentPage}&limit=${pageLimit}`;
                    
                    if (currentSearchTerm) {
                        url += `&search=${encodeURIComponent(currentSearchTerm)}`;
                    }
                    
                    if (currentSourceFilter) {
                        url += `&source=${encodeURIComponent(currentSourceFilter)}`;
                    }
                    
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    if (result.success) {
                        renderTable(result.data);
                        renderPagination(result.pagination);
                        updateStats(result.pagination.total);
                    } else {
                        dataTableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Errore nel caricamento dei dati</td></tr>';
                    }
                } catch (error) {
                    console.error('Errore:', error);
                    dataTableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">Errore nella connessione al server</td></tr>';
                }
            }
            
            // Funzione per renderizzare la tabella
            function renderTable(data) {
                if (data.length === 0) {
                    dataTableBody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Nessun dato trovato</td></tr>';
                    return;
                }
                
                let html = '';
                
                data.forEach(item => {
                    html += `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm font-medium text-gray-900">${item.name || '-'}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-gray-500">${item.email || '-'}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="text-sm text-gray-500">${item.phone || '-'}</div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getSourceBadgeColor(item.source)}">
                                    ${formatSource(item.source)}
                                </span>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                ${formatDate(item.timestamp)}
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                <button class="text-teal-600 hover:text-teal-900 view-details" data-id="${item._id}">
                                    <i class="fas fa-eye mr-1"></i> Dettagli
                                </button>
                            </td>
                        </tr>
                    `;
                });
                
                dataTableBody.innerHTML = html;
                
                // Aggiungi event listener ai pulsanti dettagli
                document.querySelectorAll('.view-details').forEach(button => {
                    button.addEventListener('click', function() {
                        const id = this.getAttribute('data-id');
                        const lead = data.find(item => item._id === id);
                        showLeadDetails(lead);
                    });
                });
            }
            
            // Funzione per formattare la fonte
            function formatSource(source) {
                switch (source) {
                    case 'hero-form':
                        return 'Form Hero';
                    case 'popup-form':
                        return 'Form Popup';
                    case 'contatti-form':
                        return 'Form Contatti';
                    default:
                        return source || 'Sconosciuto';
                }
            }
            
            // Funzione per ottenere il colore del badge della fonte
            function getSourceBadgeColor(source) {
                switch (source) {
                    case 'hero-form':
                        return 'bg-blue-100 text-blue-800';
                    case 'popup-form':
                        return 'bg-green-100 text-green-800';
                    case 'contatti-form':
                        return 'bg-purple-100 text-purple-800';
                    default:
                        return 'bg-gray-100 text-gray-800';
                }
            }
            
            // Funzione per renderizzare la paginazione
            function renderPagination(pagination) {
                totalPages = pagination.pages;
                
                // Aggiorna le informazioni sulla paginazione
                const start = (pagination.page - 1) * pagination.limit + 1;
                const end = Math.min(start + pagination.limit - 1, pagination.total);
                
                startItem.textContent = pagination.total > 0 ? start : 0;
                endItem.textContent = end;
                totalItems.textContent = pagination.total;
                
                // Crea i pulsanti di paginazione
                let html = `
                    <button id="prev-page" class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50" ${pagination.page === 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i>
                    </button>
                `;
                
                // Aggiungi numeri di pagina
                for (let i = 1; i <= pagination.pages; i++) {
                    if (
                        i === 1 ||
                        i === pagination.pages ||
                        (i >= pagination.page - 1 && i <= pagination.page + 1)
                    ) {
                        html += `
                            <button class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium ${i === pagination.page ? 'text-teal-600 bg-teal-50' : 'text-gray-700 hover:bg-gray-50'} page-number" data-page="${i}">
                                ${i}
                            </button>
                        `;
                    } else if (
                        (i === 2 && pagination.page > 3) ||
                        (i === pagination.pages - 1 && pagination.page < pagination.pages - 2)
                    ) {
                        html += `
                            <span class="relative inline-flex items-center px-4 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-700">
                                ...
                            </span>
                        `;
                        // Salta fino alla prossima pagina che vogliamo mostrare
                        if (i === 2) {
                            i = pagination.page - 2;
                        } else {
                            i = pagination.pages - 1;
                        }
                    }
                }
                
                html += `
                    <button id="next-page" class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50" ${pagination.page === pagination.pages ? 'disabled' : ''}>
                        <i class="fas fa-chevron-right"></i>
                    </button>
                `;
                
                paginationContainer.innerHTML = html;
                
                // Aggiungi event listener ai pulsanti di paginazione
                document.querySelectorAll('.page-number').forEach(button => {
                    button.addEventListener('click', function() {
                        currentPage = parseInt(this.getAttribute('data-page'));
                        loadData();
                    });
                });
                
                document.getElementById('prev-page').addEventListener('click', function() {
                    if (currentPage > 1) {
                        currentPage--;
                        loadData();
                    }
                });
                
                document.getElementById('next-page').addEventListener('click', function() {
                    if (currentPage < totalPages) {
                        currentPage++;
                        loadData();
                    }
                });
                
                // Mobile pagination
                if (document.getElementById('prev-page-mobile')) {
                    document.getElementById('prev-page-mobile').addEventListener('click', function() {
                        if (currentPage > 1) {
                            currentPage--;
                            loadData();
                        }
                    });
                }
                
                if (document.getElementById('next-page-mobile')) {
                    document.getElementById('next-page-mobile').addEventListener('click', function() {
                        if (currentPage < totalPages) {
                            currentPage++;
                            loadData();
                        }
                    });
                }
            }
            
            // Funzione per aggiornare le statistiche
            async function updateStats(totalCount) {
                totalLeadsElement.textContent = totalCount;
                
                // Calcola lead mensili
                const now = new Date();
                const firstDayOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                
                try {
                    const response = await fetch(`/api/admin/form-data?after=${firstDayOfMonth.toISOString()}`);
                    const result = await response.json();
                    
                    if (result.success) {
                        monthlyLeadsElement.textContent = result.pagination.total;
                        
                        // Calcola tasso di conversione (esempio: 30%)
                        conversionRateElement.textContent = '30%';
                    }
                } catch (error) {
                    console.error('Errore nel recupero delle statistiche mensili:', error);
                }
            }
            
            // Funzione per mostrare i dettagli di un lead
            function showLeadDetails(lead) {
                const detailsContainer = document.getElementById('lead-details');
                
                let html = `
                    <div class="space-y-4">
                        <div>
                            <h4 class="text-sm font-medium text-gray-500">Nome</h4>
                            <p class="mt-1">${lead.name || '-'}</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-gray-500">Email</h4>
                            <p class="mt-1">${lead.email || '-'}</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-gray-500">Telefono</h4>
                            <p class="mt-1">${lead.phone || '-'}</p>
                        </div>
                `;
                
                if (lead.message) {
                    html += `
                        <div>
                            <h4 class="text-sm font-medium text-gray-500">Messaggio</h4>
                            <p class="mt-1">${lead.message}</p>
                        </div>
                    `;
                }
                
                html += `
                        <div>
                            <h4 class="text-sm font-medium text-gray-500">Fonte</h4>
                            <p class="mt-1">${formatSource(lead.source)}</p>
                        </div>
                        <div>
                            <h4 class="text-sm font-medium text-gray-500">Data</h4>
                            <p class="mt-1">${formatDate(lead.timestamp)}</p>
                        </div>
                    </div>
                `;
                
                detailsContainer.innerHTML = html;
                leadModal.classList.remove('hidden');
            }
            
            // Event listeners
            searchButton.addEventListener('click', function() {
                currentSearchTerm = searchInput.value;
                currentPage = 1;
                loadData();
            });
            
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    currentSearchTerm = searchInput.value;
                    currentPage = 1;
                    loadData();
                }
            });
            
            filterSource.addEventListener('change', function() {
                currentSourceFilter = this.value;
                currentPage = 1;
                loadData();
            });
            
            closeModalBtn.addEventListener('click', function() {
                leadModal.classList.add('hidden');
            });
            
            closeModalX.addEventListener('click', function() {
                leadModal.classList.add('hidden');
            });
            
            // Chiudi modal cliccando fuori
            leadModal.addEventListener('click', function(e) {
                if (e.target === leadModal) {
                    leadModal.classList.add('hidden');
                }
            });
            
            // Carica dati all'avvio
            loadData();
        });
    </script>
</body>
</html>
